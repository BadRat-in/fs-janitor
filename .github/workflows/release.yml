# ============================================================================
# release — tag-driven build & publish pipeline
# ----------------------------------------------------------------------------
# Triggered on a semver tag push (`v*.*.*`). For each macOS target it builds a
# version-stamped static `fsj` binary, optionally codesigns + notarizes it,
# tars it, and records its sha256. The aggregate job publishes a GitHub Release
# with all tarballs plus a combined checksums file.
#
# Signing is best-effort and secret-gated (see the build job's env): with the
# Apple secrets present, binaries are Developer-ID signed (hardened runtime) and
# notarized; without them the release ships unsigned. Unsigned binaries install
# and run fine via Homebrew or curl (no quarantine attribute); only browser
# downloads then need `xattr -d com.apple.quarantine`. Homebrew tap tracked in #3.
#
# The tag is the single source of truth for the version: it is stamped into the
# binary via -ldflags, so there are no committed version files that could drift
# (hence no verify-version gate like the Wails app has).
# ============================================================================

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # build: one static binary per target, in parallel. darwin/amd64 keeps Intel
  # Macs supported; darwin/arm64 is Apple Silicon. Both cross-compile from a
  # single macos-latest runner (pure Go, CGO disabled), so no per-arch runner.
  # --------------------------------------------------------------------------
  build:
    name: build (${{ matrix.asset }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset: darwin-arm64
          - goos: darwin
            goarch: amd64
            asset: darwin-amd64
    # Apple signing/notarization secrets surfaced as env so `if:` steps can gate
    # on their presence. ALL are optional — absent secrets degrade to an
    # unsigned build (a `::warning::` is emitted), which installs fine via
    # Homebrew/curl; only browser downloads then need the quarantine workaround.
    # To enable signing, add these repo secrets (see docs/RELEASE notes in README):
    #   APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD, APPLE_DEVELOPER_ID,
    #   APPLE_NOTARY_APPLE_ID, APPLE_NOTARY_TEAM_ID, APPLE_NOTARY_PASSWORD
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          out="fsj-${{ matrix.asset }}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "$out" ./cmd/fsj

      # Codesign with a Developer ID (hardened runtime) and notarize. A bare
      # Mach-O binary cannot be stapled, so notarization is verified online by
      # Gatekeeper on first run — signing still removes the "unidentified
      # developer" block for browser-downloaded binaries. Best-effort: never
      # fails the release, so an expired cert or notary hiccup can't block a tag.
      - name: Codesign & notarize (best-effort)
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        continue-on-error: true
        run: |
          set -euo pipefail
          bin="fsj-${{ matrix.asset }}"

          # Import the Developer ID certificate into an ephemeral keychain.
          KEYCHAIN="$RUNNER_TEMP/codesign.keychain-db"
          KPASS="$(openssl rand -base64 24)"
          CERT="$RUNNER_TEMP/cert.p12"
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERT"
          security create-keychain -p "$KPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPASS" "$KEYCHAIN"
          security import "$CERT" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KPASS" "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN"
          rm -f "$CERT"

          # Sign with hardened runtime + secure timestamp, then verify.
          # Stable reverse-DNS identifier (same across both arches) rather than
          # the arch-suffixed filename codesign would derive by default.
          codesign --force --timestamp --options runtime \
            --identifier com.rkinnovate.fsj \
            --sign "$APPLE_DEVELOPER_ID" "$bin"
          codesign --verify --strict --verbose=2 "$bin"

          # Notarize a zip of the binary and wait for the result.
          ditto -c -k --keepParent "$bin" "$bin.zip"
          xcrun notarytool submit "$bin.zip" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --wait
          rm -f "$bin.zip"

      - name: Note unsigned build
        if: env.APPLE_CERTIFICATE_BASE64 == ''
        run: echo "::warning::No Apple signing secrets set — shipping an UNSIGNED binary. Homebrew/curl installs run fine; browser downloads need 'xattr -d com.apple.quarantine ./fsj'."

      - name: Package (tarball + checksum)
        run: |
          out="fsj-${{ matrix.asset }}"
          tar -czf "${out}.tar.gz" "$out"
          shasum -a 256 "${out}.tar.gz" > "${out}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsj-${{ matrix.asset }}
          path: |
            fsj-${{ matrix.asset }}.tar.gz
            fsj-${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # release: gather every leg's artifacts, build a combined checksums file, and
  # publish the GitHub Release. Single writer, so no matrix-output races.
  # --------------------------------------------------------------------------
  release:
    name: publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        working-directory: dist
        run: cat *.sha256 > checksums.txt && cat checksums.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  # --------------------------------------------------------------------------
  # update-tap: bump the Homebrew tap formula (BadRat-in/homebrew-tap) to the
  # new tag. The tap ships a PREBUILT binary formula (no Go build for users), so
  # the bump updates the version, both per-arch download URLs, and both sha256s
  # read from the release's checksums.txt. Authenticated with an SSH deploy key
  # (HOMEBREW_TAP_DEPLOY_KEY secret) that has write access to only the tap repo —
  # narrower than a personal token. Absent key skips with a warning (bump the
  # formula by hand instead). See docs/HOMEBREW.md.
  # --------------------------------------------------------------------------
  update-tap:
    name: bump homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
    steps:
      - name: Configure SSH deploy key
        if: env.HOMEBREW_TAP_DEPLOY_KEY != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host github.com\n  IdentityFile ~/.ssh/tap_key\n  IdentitiesOnly yes\n' >> ~/.ssh/config

      - name: Bump formula to ${{ github.ref_name }}
        if: env.HOMEBREW_TAP_DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/checksums.txt" -o checksums.txt
          ARM_SHA="$(awk '/darwin-arm64/{print $1}' checksums.txt)"
          AMD_SHA="$(awk '/darwin-amd64/{print $1}' checksums.txt)"
          test -n "$ARM_SHA" && test -n "$AMD_SHA"
          git clone git@github.com:BadRat-in/homebrew-tap.git tap
          cd tap
          awk -v ver="$VERSION" -v tag="$TAG" -v repo="$GITHUB_REPOSITORY" -v arm="$ARM_SHA" -v amd="$AMD_SHA" '
            /^  version / { print "  version \"" ver "\""; next }
            /fsj-darwin-arm64\.tar\.gz/ {
              print "      url \"https://github.com/" repo "/releases/download/" tag "/fsj-darwin-arm64.tar.gz\""
              getline; print "      sha256 \"" arm "\""; next
            }
            /fsj-darwin-amd64\.tar\.gz/ {
              print "      url \"https://github.com/" repo "/releases/download/" tag "/fsj-darwin-amd64.tar.gz\""
              getline; print "      sha256 \"" amd "\""; next
            }
            { print }
          ' Formula/fsj.rb > Formula/fsj.rb.new
          mv Formula/fsj.rb.new Formula/fsj.rb
          if git diff --quiet; then echo "formula already current"; exit 0; fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "fsj ${VERSION}"
          git push

      - name: Note tap not configured
        if: env.HOMEBREW_TAP_DEPLOY_KEY == ''
        run: echo "::warning::HOMEBREW_TAP_DEPLOY_KEY not set — skipping automatic Homebrew tap bump. Update BadRat-in/homebrew-tap/Formula/fsj.rb by hand (see docs/HOMEBREW.md)."
